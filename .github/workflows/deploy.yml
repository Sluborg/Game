name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (production)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main -> site root (/Game/)
        working-directory: main/web
        run: |
          npm ci
          npm run build -- --base=/Game/

      - name: Build dev -> site/dev (/Game/dev/)
        working-directory: dev/web
        run: |
          npm ci
          npm run build -- --base=/Game/dev/

      - name: Assemble combined site
        run: |
          mkdir -p site
          cp -r main/web/dist/. site/
          mkdir -p site/dev
          cp -r dev/web/dist/. site/dev/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
